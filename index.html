<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Prompt Builder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff' stroke='%23e5e7eb' stroke-width='4'/><text x='50' y='68' font-size='58' font-family='sans-serif' font-weight='700' fill='%23111827' text-anchor='middle'>P</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --accent:       #111827;
      --accent-hover: #000000;
      --accent-light: #f3f4f6;
      --accent-border:#9ca3af;
      --success:      #111827;
      --success-bg:   #f9fafb;
      --success-border:#d1d5db;
      --danger:       #ef4444;
      --danger-bg:    #fef2f2;
      --danger-border:#fecaca;
      --radius: 8px;
    }

    html { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans', 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: var(--gray-900);
      background: #f0efed;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0; }
    header .badge {
      font-size: 10px; font-weight: 600;
      color: var(--gray-500); background: var(--gray-100);
      padding: 2px 7px; border-radius: 20px;
      border: 1px solid var(--gray-200);
    }

    /* ── Header API Dropdown ── */
    .api-dropdown-wrap {
      margin-left: auto;
      position: relative;
    }
    .api-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      background: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      transition: border-color .15s;
      white-space: nowrap;
    }
    .api-toggle-btn:hover { border-color: var(--gray-400); }
    .api-header-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gray-300);
      flex-shrink: 0;
    }
    .api-header-dot.saved { background: #16a34a; }
    .api-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 280px;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.09);
      z-index: 200;
    }
    .api-dropdown.open { display: block; }
    .api-dropdown-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: .4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── Main content — 2컬럼 그리드, 전체 높이 ── */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 100%;
      height: calc(100vh - 52px - 120px);
      overflow: hidden;
      padding: 24px 48px;
      background: #ffffff;
      border-radius: 16px;
      margin: 60px 180px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── 좌우 컬럼 ── */
    .col-left {
      height: 100%;
      overflow: hidden;
      padding: 20px 24px;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .col-left > .content-section {
      flex: 1;
      min-height: 0;
    }

    .col-right {
      height: 100%;
      overflow: hidden;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* 상품정보·촬영설정은 고정, 프롬프트 카드는 나머지 채움 */
    .col-right > .content-section { flex-shrink: 0; }
    .col-right > .content-section:last-child { flex: 1; min-height: 0; }

    /* ── Content sections — 카드 스타일 제거, 구분은 제목으로 ── */
    .content-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
      margin-bottom: 0;
    }

    /* ── Section heading (카드 상단 대표 제목) ── */
    .section-heading {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-900);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-100);
      margin-bottom: 2px;
    }
    /* 제목 + 우측 버튼 행 */
    .section-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-100);
      margin-bottom: 2px;
    }
    .section-heading-row .section-heading {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    /* ── Section sub-titles ── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── 2-col field row ── */
    .field-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    /* ── Image Upload ── */
    .upload-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
      border-radius: var(--radius);
      transition: background .15s, box-shadow .15s;
    }
    .upload-area.drag-over {
      background: var(--gray-100);
      box-shadow: 0 0 0 6px var(--gray-100);
    }
    /* mainSection — 높이를 채우도록 flex column */
    .upload-area > div:first-child {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .slot-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    /* 메인 슬롯 — 남은 높이를 꽉 채움 */
    .upload-slot-main { position: relative; width: 100%; flex: 1; min-height: 0; }
    .upload-slot-main > label { min-height: unset; }
    .upload-slot-main:has(.thumb-wrap.has-image) > label { display: none; }
    .upload-slot-main .thumb-wrap { position: absolute; inset: 0; }
    .upload-slot-main .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      background-color: var(--gray-50);
      border-radius: var(--radius);
      border: 1.5px solid var(--gray-200);
    }
    .upload-slot-main .thumb-wrap .del-btn { position: absolute; top: 4px; right: 4px; }
    /* 디테일 슬롯 목록 — 2×2 그리드, 높이 채움 */
    .upload-detail-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }
    /* 각 디테일 셀 — 세로 배치 (썸네일 위, 인풋 아래) */
    .slot-detail-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 0;
    }
    .slot-detail-thumb-col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; }
    /* 디테일 슬롯 — 높이 채움 */
    .upload-slot-detail { position: relative; width: 100%; flex: 1; min-height: 0; }

    /* 공통 upload-slot */
    .upload-slot label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      border: 1.5px dashed var(--gray-300);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--gray-400);
      font-size: 11px;
      gap: 4px;
      transition: border-color .15s, background .15s;
    }
    .upload-slot label:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .upload-slot input[type="file"] { display: none; }
    .thumb-wrap { position: absolute; inset: 0; display: none; }
    .thumb-wrap.has-image { display: block; }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1.5px solid var(--gray-200);
    }
    .thumb-wrap .del-btn {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px;
      transition: background .15s;
    }
    .thumb-wrap .del-btn:hover { background: var(--danger); }

    /* 디테일 참고 입력 */
    .detail-ref-input {
      width: 100%;
      padding: 5px 8px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 11px;
      color: var(--gray-900);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .detail-ref-input:focus { border-color: var(--accent); }
    .detail-ref-input::placeholder { color: var(--gray-400); }
    .slot-hint { font-size: 11px; color: #999; margin-bottom: 4px; display: none; }
    .slot-hint.visible { display: block; }

    /* Analysis */
    .upload-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .upload-count { font-size: 12px; color: var(--gray-400); }
    .analysis-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .analysis-range {
      display: flex;
      gap: 5px;
    }
    /* 라디오 입력 숨김 — 시각적으로 chip 토글 */
    .analysis-range input[type="radio"] { display: none; }
    .analysis-range label {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      background: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      user-select: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .analysis-range label:hover { border-color: var(--accent); color: var(--accent); }
    .analysis-range label:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .analysis-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid transparent;
    }
    .analysis-banner.loading { display: flex; background: var(--accent-light); color: var(--accent); border-color: var(--accent-border); }
    .analysis-banner.success { display: flex; background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
    .analysis-banner.error   { display: flex; background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }

    /* ── Form fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 500; color: var(--gray-700); }
    .field input[type="text"],
    .field textarea,
    .field input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      color: var(--gray-900);
      background: #fff;
      outline: none;
      transition: border-color .15s, background .15s, color .15s;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: var(--gray-400); }
    .field input.analyzing,
    .field textarea.analyzing {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-light);
      font-style: italic;
      cursor: not-allowed;
    }

    /* ── Hex input ── */
    .hex-input {
      width: 100px;
      padding: 6px 10px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 12px;
      color: var(--gray-900);
      outline: none;
      transition: border-color .15s;
    }
    .hex-input:focus { border-color: var(--accent); }
    .hex-input::placeholder { color: var(--gray-400); }

    /* ── Chip buttons ── */
    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 6px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      background: #fff;
      font-family: inherit; font-size: 13px;
      color: var(--gray-700);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── Gloss quick-select ── */
    .section-title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; min-height: 24px; }
    .section-title-row .section-title { margin-bottom: 0; }
    .gloss-chip-inline-group { display: flex; gap: 4px; }
    .gloss-chip {
      padding: 2px 8px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      background: #fff;
      font-family: inherit; font-size: 11px;
      color: var(--gray-700);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .gloss-chip:hover { border-color: var(--accent); color: var(--accent); }
    .gloss-chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── Color chips ── */
    .color-chip {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
      outline: none;
      flex-shrink: 0;
    }
    .color-chip:hover { transform: scale(1.1); }
    .color-chip.active { border-color: var(--gray-900); transform: scale(1.1); }
    .color-chip[data-value="white"]      { background: #ffffff; box-shadow: inset 0 0 0 1px var(--gray-300); }
    .color-chip[data-value="light-gray"] { background: #e5e7eb; }
    .color-chip[data-value="soft-gray"]  { background: #f5f5f5; box-shadow: inset 0 0 0 1px var(--gray-300); }

    /* ── Checkbox options (2-col) ── */
    .check-group { display: flex; flex-wrap: nowrap; gap: 16px; width: 100%; justify-content: space-between; }
    .check-item {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 13px; color: var(--gray-700);
      user-select: none; white-space: nowrap;
    }
    .check-item input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }

    /* ── Tooltip icon ── */
    .tip-wrap { position: relative; display: inline-flex; align-items: center; }
    .tip-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 1px solid #ccc;
      color: #bbb;
      font-size: 10px; font-style: normal; font-weight: 600;
      cursor: default;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
      line-height: 1;
    }
    .tip-wrap:hover .tip-icon { border-color: #888; color: #888; }
    .tip-box {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      left: auto;
      transform: none;
      background: #333;
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
      border-radius: 6px;
      padding: 6px 10px;
      max-width: 200px;
      width: max-content;
      white-space: normal;
      z-index: 100;
      pointer-events: none;
    }
    .tip-box::after {
      content: '';
      position: absolute;
      top: 100%; right: 3px;
      left: auto;
      transform: none;
      border: 5px solid transparent;
      border-top-color: #333;
    }
    .tip-wrap:hover .tip-box { display: block; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-outline { background: #fff; color: var(--gray-700); border: 1.5px solid var(--gray-200); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-outline:disabled { opacity: .5; cursor: not-allowed; }
    .btn-small { padding: 5px 10px; font-size: 11px; }

    /* ── Prompt area ── */
    .prompt-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #prompt-output {
      width: 100%;
      flex: 1;
      min-height: 120px;
      overflow-y: auto;
      padding: 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.7;
      color: var(--gray-700);
      background: var(--gray-50);
      resize: none;
      outline: none;
      transition: border-color .15s;
    }
    #prompt-output:focus { border-color: var(--accent); }
    .prompt-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .prompt-status {
      font-size: 12px;
      color: var(--gray-400);
    }
    .prompt-status.error { color: var(--danger); }
    .prompt-status.success { color: var(--success); }
    .copy-toast { font-size: 12px; color: var(--success); opacity: 0; transition: opacity .3s; margin-right: 6px; }
    .copy-toast.show { opacity: 1; }

    /* ── Category toast ── */
    #cat-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #111827;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s, transform .22s;
      z-index: 9999;
      white-space: nowrap;
    }
    #cat-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── API Key (inside dropdown) ── */
    .api-key-status { display: flex; align-items: center; gap: 4px; font-size: 11px; margin-top: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray-300); }
    .status-dot.saved { background: #16a34a; }
    .api-key-status span { color: var(--gray-500); }
    .eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); padding: 2px; display: flex;
    }
    .eye-btn:hover { color: var(--gray-700); }
    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 36px; }

    /* ── Segment control (대분류) ── */
    .segment-group {
      display: inline-flex;
      width: 100%;
      background: #ffffff;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 3px;
      gap: 0;
    }
    .segment-btn {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-right: 1px solid #e5e7eb;
      border-radius: 0;
      background: #ffffff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      text-align: center;
    }
    .segment-btn:last-child { border-right: none; }
    .segment-btn:hover { color: var(--gray-900); }
    .segment-btn.active {
      background: #111827;
      color: #ffffff;
      border-radius: 8px;
      border-right: none;
    }
    .segment-btn.active + .segment-btn { border-left: none; }

<script>
/* ═══════════════════════════════════════════════
   1. 상수 / 매핑 테이블
═══════════════════════════════════════════════ */
const MAX_IMAGES = 5;
const CLAUDE_IMAGE_MAX_BASE64_BYTES = 9_500_000;
const CLAUDE_IMAGE_START_MAX_SIDE = 1800;
const CLAUDE_IMAGE_MIN_MAX_SIDE = 900;

const FIELD_PLACEHOLDERS = {
  material:    '예: 100% 린넨, 울 혼방, 가죽...',
  detail:      '예: 오버핏, 드롭숄더, 사이드 슬릿, 자수 로고...',
  'color-text':'예: 오프화이트, 버건디, 네이비...',
};

const CUT_VIEW = {
  'front':         'Front',
  'back':          'Back',
  'three-quarter': 'Three-quarter',
  'detail':        'Detail close-up',
};

const BG_HEX = {
  'white':      '#ffffff',
  'light-gray': '#efefef',
  'soft-gray':  '#f5f5f5',
};

const SUB_CATEGORIES = {
  'clothing':  [{ value: 'outer', label: '아우터' }, { value: 'top', label: '상의' }, { value: 'pants', label: '바지' }, { value: 'skirt', label: '스커트' }, { value: 'dress', label: '드레스' }],
  'accessory': [],
};

const GLOSS_TAGS = {
  'matte':       '[무광 / matte finish] ',
  'semi-glossy': '[세미글로시 / semi-glossy finish] ',
  'glossy':      '[유광 / glossy finish] ',
};
const GLOSS_TAG_RE = /^\[(무광 \/ matte finish|세미글로시 \/ semi-glossy finish|유광 \/ glossy finish)\] */;
const GLOSS_FINISH_PROMPTS = {
  'matte':       'matte finish, no sheen, no specular highlights',
  'semi-glossy': 'semi-glossy finish — visible natural sheen, soft specular highlights on surface. NOT matte.',
  'glossy':      'high-gloss finish — strong specular highlights, mirror-like sheen. NOT matte.',
};

/* ═══════════════════════════════════════════════
   2. 이미지 슬롯 초기화
═══════════════════════════════════════════════ */
const uploadArea       = document.getElementById('upload-area');
const imgCountEl       = document.getElementById('img-count');
const analyzeBtn       = document.getElementById('analyze-btn');
const analysisScopeEls = document.querySelectorAll('input[name="analysis-scope"]');
const images           = new Array(MAX_IMAGES).fill(null);
let translationCache   = null;

function updateCount() {
  imgCountEl.textContent = images.filter(Boolean).length;
  updateAnalyzeControls();
}

function updateAnalyzeControls(isAnalyzing = false) {
  analyzeBtn.disabled = !Boolean(images[0]) || isAnalyzing;
  analysisScopeEls.forEach(input => { input.disabled = isAnalyzing; });
}

function getAnalysisScope() {
  return document.querySelector('input[name="analysis-scope"]:checked')?.value || 'primary';
}

function getSlotReference(index) {
  if (index === 0) return '[IMPORTANT CONTEXT - Primary full product image]';
  const label = document.getElementById(`detail-ref-${index}`)?.value.trim() || `Detail reference image from slot ${index + 1}`;
  return `[IMPORTANT CONTEXT - ${label}]`;
}

function getAnalysisItems() {
  if (getAnalysisScope() === 'primary') {
    return images[0] ? [{ ...images[0], index: 0, note: getSlotReference(0) }] : [];
  }
  return images
    .map((item, index) => item ? { ...item, index, note: getSlotReference(index) } : null)
    .filter(Boolean);
}

async function analyzeCurrentImages() {
  const items = getAnalysisItems();
  if (!items.length) {
    showBanner('error', '분석할 이미지를 먼저 업로드해 주세요.');
    setTimeout(hideBanner, 3000);
    return;
  }
  await analyzeImageWithClaude(items);
}

async function setImageAtSlot(index, file) {
  if (images[index]?.url) URL.revokeObjectURL(images[index].url);
  const url = URL.createObjectURL(file);
  images[index] = { file, url };
  document.getElementById(`thumb-img-${index}`).src = url;
  document.getElementById(`thumb-${index}`).classList.add('has-image');
  updateCount();
  saveImages();
}

async function addDroppedImages(fileList) {
  const files = [...fileList].filter(f => f.type.startsWith('image/'));
  if (!files.length) {
    showBanner('error', '이미지 파일만 업로드할 수 있습니다.');
    setTimeout(hideBanner, 3000);
    return;
  }
  let added = 0;
  for (const file of files) {
    const index = images.findIndex(item => !item);
    if (index === -1) break;
    await setImageAtSlot(index, file);
    added++;
  }
  if (added < files.length) {
    showBanner('error', '이미지는 최대 5장까지 업로드할 수 있습니다.');
    setTimeout(hideBanner, 3000);
  }
}

const UPLOAD_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`;

const DETAIL_PLACEHOLDERS = [
  '위치 포함 필수 예: 하단 우측 금속 로고',
  '위치 포함 필수 예: 하단 우측 금속 로고',
  '위치 포함 필수 예: 하단 우측 금속 로고',
  '위치 포함 필수 예: 하단 우측 금속 로고',
];

function createUploadSlot(i) {
  const slot = document.createElement('div');
  slot.className = 'upload-slot';
  slot.innerHTML = `
    <label for="img-input-${i}">${UPLOAD_SVG}</label>
    <input type="file" id="img-input-${i}" accept="image/*" />
    <div class="thumb-wrap" id="thumb-${i}">
      <img id="thumb-img-${i}" src="" alt="미리보기 ${i + 1}" />
      <button class="del-btn" data-index="${i}" title="삭제">✕</button>
    </div>
  `;
  slot.querySelector(`#img-input-${i}`).addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await setImageAtSlot(i, file);
    e.target.value = '';
  });
  slot.querySelector('.del-btn').addEventListener('click', () => {
    if (images[i]?.url) URL.revokeObjectURL(images[i].url);
    images[i] = null;
    document.getElementById(`thumb-${i}`).classList.remove('has-image');
    document.getElementById(`thumb-img-${i}`).src = '';
    updateCount();
    saveImages();
  });
  return slot;
}

/* 슬롯 1 — 메인 */
const mainSection = document.createElement('div');
const slotHint = document.createElement('p');
slotHint.id = 'slot-hint';
slotHint.className = 'slot-hint';
slotHint.textContent = '💡 후면컷은 완성된 정면 결과물을 슬롯 1에 넣어야 스타일이 통일됩니다.';
const mainLbl = document.createElement('p');
mainLbl.className = 'slot-label';
mainLbl.textContent = '메인 이미지';
const mainSlot = createUploadSlot(0);
mainSlot.classList.add('upload-slot-main');
const mainRefInput = document.createElement('input');
mainRefInput.type = 'text';
mainRefInput.id = 'detail-ref-0';
mainRefInput.className = 'detail-ref-input';
mainRefInput.placeholder = '원본 이미지 (만들고 싶은 컷 방향과 동일하게)';
mainSection.appendChild(slotHint);
mainSection.appendChild(mainLbl);
mainSection.appendChild(mainSlot);
mainSection.appendChild(mainRefInput);
uploadArea.appendChild(mainSection);

/* 슬롯 2~5 — 디테일 */
const detailSection = document.createElement('div');
detailSection.className = 'upload-detail-section';

for (let i = 1; i < MAX_IMAGES; i++) {
  const row = document.createElement('div');
  row.className = 'slot-detail-row';

  const thumbCol = document.createElement('div');
  thumbCol.className = 'slot-detail-thumb-col';
  const lbl = document.createElement('p');
  lbl.className = 'slot-label';
  lbl.textContent = `디테일 ${i}`;
  const detailSlot = createUploadSlot(i);
  detailSlot.classList.add('upload-slot-detail');
  thumbCol.appendChild(lbl);
  thumbCol.appendChild(detailSlot);

  const refInput = document.createElement('input');
  refInput.type = 'text';
  refInput.id = `detail-ref-${i}`;
  refInput.className = 'detail-ref-input';
  refInput.placeholder = DETAIL_PLACEHOLDERS[i - 1];

  row.appendChild(thumbCol);
  row.appendChild(refInput);
  detailSection.appendChild(row);
}

uploadArea.appendChild(detailSection);

['dragenter', 'dragover'].forEach(ev => {

/* ═══════════════════════════════════════════════
   9. 이미지 → base64
═══════════════════════════════════════════════ */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function loadImageForResize(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('이미지를 압축할 수 없습니다.'));
    };
    img.src = url;
  });
}

function canvasToBlob(canvas, type, quality) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (blob) resolve(blob);
      else reject(new Error('이미지를 압축할 수 없습니다.'));
    }, type, quality);
  });
}

async function resizeImageForClaude(file) {
  const originalBase64 = await fileToBase64(file);
  if (originalBase64.length <= CLAUDE_IMAGE_MAX_BASE64_BYTES) {
    return { base64: originalBase64, mediaType: file.type || 'image/jpeg', resized: false };
  }

  const img = await loadImageForResize(file);
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const outputType = 'image/jpeg';
  let maxSide = CLAUDE_IMAGE_START_MAX_SIDE;
  let quality = 0.86;

  while (maxSide >= CLAUDE_IMAGE_MIN_MAX_SIDE) {
    const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
    canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
    canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    for (quality = 0.86; quality >= 0.58; quality -= 0.08) {
      const blob = await canvasToBlob(canvas, outputType, quality);
      const base64 = await blobToBase64(blob);
      if (base64.length <= CLAUDE_IMAGE_MAX_BASE64_BYTES) {
        return { base64, mediaType: outputType, resized: true };
      }
    }

    maxSide = Math.round(maxSide * 0.82);
  }

  throw new Error('이미지가 너무 커서 분석용 크기로 줄일 수 없습니다. 더 작은 이미지로 다시 업로드해 주세요.');
}

- Waistband: type and closure details.

    'dress': `
[Category focus — Dress]

- Fabric drape: how the material falls.
- Neckline: exact design.

Analyze the provided product images in detail and extract the following in Korean:

3. color: Describe the color in detail including:

If multiple images are provided, use Slot 1 as the primary reference and extract additional details from Slots 2-5 to supplement the analysis.

Respond in Korean JSON only: {"material": "", "details": "", "color": "", "sheen_level": ""}
sheen_level: set to one of full_matte / semi_matte / semi_glossy / high_gloss for leather products; empty string for all other products.`;
}

async function analyzeImageWithClaude(items) {
  const apiKey = localStorage.getItem('claude_api_key');
  if (!apiKey) {
    showBanner('error', 'Claude API 키를 먼저 저장해 주세요.');
    setTimeout(hideBanner, 3000);
    return;
  }

  setFieldsAnalyzing(true);
  showBanner('loading', `Claude AI가 이미지 ${items.length}장을 분석 중입니다...`);

  try {
    const imageContent = [];
    for (const item of items) {
      const { base64, mediaType } = await resizeImageForClaude(item.file);
      imageContent.push({ type: 'text', text: `Slot ${item.index + 1}: ${item.note}` });
      imageContent.push({ type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } });
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        system: buildAnalysisSystemPrompt(),
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: 'Analyze these product images and consolidate the result.' },
            ...imageContent,
          ],
        }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 오류 (${res.status})`);
    }

    const data  = await res.json();
    const text  = data.content?.[0]?.text || '';
    const raw   = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) {
      console.error('[분석 원본 응답]', text);
      throw new Error('분석 결과를 파싱할 수 없습니다.');
    }

    const result = JSON.parse(match[0]);

    document.getElementById('material').value   = result.material || '';
    document.getElementById('detail').value     = result.details  || '';
    document.getElementById('color-text').value = result.color    || '';
    translationCache = null;

    showBanner('success', '분석 완료! 필드가 자동으로 채워졌습니다.');
    setTimeout(hideBanner, 2500);

  } catch (err) {
    console.error('[Claude 분석 오류]', err);
    showBanner('error', `분석 실패: ${err.message}`);
    setTimeout(hideBanner, 4000);
  } finally {
    setFieldsAnalyzing(false);
  }
}

async function translatePromptFieldsToEnglish(values) {
  const sourceKey = JSON.stringify(values);
  if (translationCache?.sourceKey === sourceKey) return translationCache.values;

  const apiKey = localStorage.getItem('claude_api_key');
  if (!apiKey) throw new Error('Claude API 키를 먼저 저장해 주세요.');

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 300,
      system: `Translate Korean fashion product attributes into concise English phrases for an image generation prompt.
Respond in JSON only: {"material": "", "details": "", "color": ""}`,
      messages: [{
        role: 'user',
        content: [{ type: 'text', text: `material: ${values.material}\ndetails: ${values.detail}\ncolor: ${values.color}` }],
      }],
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `영문 변환 오류 (${res.status})`);
  }

  const data  = await res.json();
  const text  = data.content?.[0]?.text || '';
  const cleaned = text.replace(/```json|```/g, '').trim();
  const match = cleaned.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('영문 변환 결과를 파싱할 수 없습니다.');

  const result = JSON.parse(match[0]);
  const translated = {
    material: result.material || values.material,
    detail:   result.details  || values.detail,
    color:    result.color    || values.color,
  };
  translationCache = { sourceKey, values: translated };
  return translated;
}

function buildMatLine(mat, color, detail) {
  // 글로스 태그는 번역 과정에서 달라질 수 있으므로 패턴으로 제거
  let cleaned = mat.replace(/^\[(?:무광|세미글로시|유광|matte|semi-glossy|glossy)[^\]]*\]\s*/i, '');
  if (_activeGloss === 'semi-glossy' || _activeGloss === 'glossy') {
    cleaned = cleaned.replace(/\bmatte\b/gi, '').replace(/\s{2,}/g, ' ').trim().replace(/^[,\s]+|[,\s]+$/g, '');
  }
  const finishText = GLOSS_FINISH_PROMPTS[_activeGloss] || '';
  return finishText
    ? `Material: ${cleaned} (${finishText}). Color: ${color}. Key details: ${detail}.`
    : `Material: ${cleaned}. Color: ${color}. Key details: ${detail}.`;
}

function buildPrompt(values) {
  const category = getActiveCategory() || 'top';
  const cut      = getActiveChip('cut-group')      || 'front';
  const bg       = getBackgroundValue();
  const cutView  = CUT_VIEW[cut] || cut;
  const { material, color } = values;

  const extras = [...document.querySelectorAll('.extra-opt:checked')]
    .map(cb => cb.dataset.prompt).filter(p => p);
  const isLeatherVinyl = !!document.getElementById('leather-vinyl-opt')?.checked;

  /* 의류 카테고리 공통: body 관련 단어 제거 */
  const cleanDetail = values.detail
    .replace(/\b(body|curves?|curve[ds]?|fitted?|body-hugging|body-contouring|body[-\s]?curve[ds]?)\b/gi, '')
    .replace(/,\s*,/g, ',').replace(/\s+/g, ' ').trim().replace(/^,|,$/g, '').trim();

  let lines;

  if (category === 'top') {
    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered straight-on composition. Clean catalog product shot. No hanger, no mannequin, no model, no hands, no props. The garment is displayed suspended in air, showing its natural shape and vertical drape as if hanging.`,
      isLeatherVinyl
        ? `Retouch and enhance the garment professionally: clean up the overall appearance, remove lint, dust, and minor distracting artifacts. Relight with soft even studio lighting. Preserve natural leather/vinyl wrinkles and surface texture — do NOT flatten or remove natural material creases. The wrinkles are part of the material character and must remain visible.`
        : `Retouch and clean up the garment: remove all wrinkles, creases, and folds. Make the fabric look smooth and neatly pressed while maintaining a natural hanging drape.`,
      ...(isLeatherVinyl ? [] : [`Relight with soft, even studio lighting from the front. No shadows on the background.`]),
      buildMatLine(material, color, cleanDetail),
      `Preserve the exact silhouette, design, and proportions of the garment.`,
      `Do not change the clothing structure, pattern, or color in any way.`,
      `Preserve the exact neckline shape from the reference image accurately. Do not alter the neckline design.`,
      `Any brand logo or emblem must be small and subtle, exactly as shown in the reference. Do not enlarge or exaggerate the logo.`,
      `Professional e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      ...extras,
      `Present the garment as a naturally hanging product shot, floating in air — clean, minimal, and suitable for high-end e-commerce display. Not a flat lay.`,
    ];

  } else if (category === 'pants') {
    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered straight-on composition. Clean catalog product shot. No hanger, no mannequin, no model, no hands, no props. The pants are displayed flat, showing their natural silhouette and shape from the front.`,
      `Remove excessive wrinkles but preserve the natural texture and character of the fabric. Keep center front and back creases crisp and clean.`,
      `Relight with soft, even studio lighting from the front. No shadows on the background.`,
      buildMatLine(material, color, cleanDetail),
      `Preserve the exact silhouette, design, and proportions of the garment.`,
      `Do not change the clothing structure, pattern, or color in any way.`,
      `Any brand logo or emblem must be small and subtle, exactly as shown in the reference. Do not enlarge or exaggerate the logo.`,
      `Professional e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      ...extras,
    ];

  } else if (category === 'skirt') {
    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered straight-on composition. Clean catalog product shot. No hanger, no mannequin, no model, no hands, no props. The skirt is displayed suspended in air, showing its natural drape and volume as if hanging.`,
      `Retouch and clean up the garment but preserve natural fabric drape and flow. Keep pleats, gathers, and volume shapes intact.`,
      `Relight with soft, even studio lighting from the front. Subtle natural shadow to emphasize volume and shape.`,
      buildMatLine(material, color, cleanDetail),
      `Preserve the exact silhouette, design, and proportions of the garment.`,
      `Do not change the clothing structure, pattern, or color in any way.`,
      `Any brand logo or emblem must be small and subtle, exactly as shown in the reference. Do not enlarge or exaggerate the logo.`,
      `Professional e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      ...extras,
    ];

  } else if (category === 'dress') {
    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered straight-on composition. Clean catalog product shot. No hanger, no mannequin, no model, no hands, no props. The dress is displayed suspended in air, showing its full length, natural shape and drape as if hanging.`,
      `Retouch and clean up the garment but preserve natural fabric drape and flow. Remove excessive wrinkles while keeping the natural movement of the fabric intact.`,
      `Relight with soft, even studio lighting from the front. Subtle natural shadow to emphasize volume and length.`,
      buildMatLine(material, color, cleanDetail),
      `Preserve the exact silhouette, design, and full length proportions of the dress.`,
      `Do not change the clothing structure, pattern, or color in any way.`,
      `Preserve the exact neckline shape from the reference image accurately. Do not alter the neckline design.`,
      `Any brand logo or emblem must be small and subtle, exactly as shown in the reference. Do not enlarge or exaggerate the logo.`,
      `Professional e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      `Present the full-length dress as a naturally hanging product shot, floating in air — clean, minimal, and suitable for high-end e-commerce display. Not a flat lay.`,
      ...extras,
    ];

  } else if (category === 'outer') {
    const hasTextureEmphasis = extras.includes('Render fabric texture and material quality accurately. Emphasize the surface texture and tactile quality of the fabric.');
    const raw = getPromptSourceValues();
    const isSuede = mentionsSuede(material, cleanDetail, raw.material, raw.detail);
    const outerRetouchLine = isSuede
      ? `Retouch and clean up the garment: remove major wrinkles and creases, but preserve the natural suede nap, directional grain, subtle mottled shading, and soft brushed surface. Do NOT make the fabric look like smooth wool, felt, boiled wool, fleece, or a flat coat fabric.`
      : isLeatherVinyl
      ? `Retouch and enhance the garment professionally: clean up the overall appearance, remove lint, dust, and minor distracting artifacts. Relight with soft even studio lighting. Preserve natural leather/vinyl wrinkles and surface texture — do NOT flatten or remove natural material creases. The wrinkles are part of the material character and must remain visible.`
      : `Retouch and clean up the garment: remove all wrinkles and creases. Make the fabric look smooth and neatly pressed while maintaining structured shape.`;
    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered straight-on composition. Clean catalog product shot. No hanger, no mannequin, no model, no hands, no props. The garment is displayed suspended in air, showing its natural shape and structured silhouette as if hanging.`,
      outerRetouchLine,
      ...(isLeatherVinyl ? [] : [`Relight with soft, even studio lighting from the front. No shadows on the background.`]),
      `IMPORTANT: Preserve the EXACT proportions and aspect ratio of the original garment — do NOT stretch, elongate, or compress the garment vertically or horizontally. The sleeve length, body length, and shoulder width ratio must match the reference image precisely.`,
      buildMatLine(material, color, cleanDetail),
      ...(hasTextureEmphasis && isSuede ? [`The fabric must read as real suede, not wool: visible short brushed nap, velvety directional pile, irregular suede grain, matte surface, and subtle light/dark variation when the pile changes direction. Avoid any felted, woolly, fuzzy coat, tweed, melton, fleece, or boiled-wool appearance.`] : []),
      `Preserve the exact silhouette, design, and proportions of the garment.`,
      `Do not change the clothing structure, pattern, or color in any way.`,
      `Preserve the exact collar and lapel shape from the reference image accurately.`,
      `Any brand logo or emblem must be small and subtle, exactly as shown in the reference. Do not enlarge or exaggerate the logo.`,
      `Professional e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      ...extras,
    ];

  } else {
    /* 악세 */
    lines = [
      `Remove the existing background completely and replace with a solid ${bg} background.`,
      `Keep the product exactly as shown, ${cutView} view, centered composition.`,
      `Relight with soft, even studio lighting. Subtle shadow beneath the product only.`,
      buildMatLine(material, color, values.detail),
      `Preserve exact product shape, proportions, surface texture, and logo detail accurately.`,
      `Ensure logo remains sharp and clearly readable.`,
      `Clean e-commerce product shot. No stylization, no artistic effects.`,
      ...extras,
    ];
  }

  return lines.join('\n');
}

document.getElementById('generate-btn').addEventListener('click', async () => {
  const missing = validatePromptInputs();
  if (missing.length) {
    setCopyEnabled(false);
    setPromptStatus(missing[0], 'error');
    return;
  }

  const generateBtn = document.getElementById('generate-btn');
  generateBtn.disabled = true;
  setCopyEnabled(false);
  setPromptStatus('한글 입력값을 영문 프롬프트용으로 변환 중입니다...', '');

  try {
    const translated = await translatePromptFieldsToEnglish(getPromptSourceValues());
    document.getElementById('prompt-output').value = buildPrompt(translated);
    setCopyEnabled(true);
    setPromptStatus('영문 프롬프트가 생성되었습니다.', 'success');
    saveState();
  } catch (err) {
    setPromptStatus(`프롬프트 생성 실패: ${err.message}`, 'error');
  } finally {
    generateBtn.disabled = false;
  }
});

/* ═══════════════════════════════════════════════
   12. 복사 버튼
═══════════════════════════════════════════════ */
document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('prompt-output').value;
  if (!text) {
    setPromptStatus('복사할 프롬프트가 없습니다.', 'error');
    setCopyEnabled(false);
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
    setPromptStatus('프롬프트가 복사되었습니다.', 'success');
  });
});

function resetAll() {
  for (let i = 0; i < MAX_IMAGES; i++) {
    if (images[i]?.url) URL.revokeObjectURL(images[i].url);
    images[i] = null;
    document.getElementById(`thumb-${i}`)?.classList.remove('has-image');
    const img = document.getElementById(`thumb-img-${i}`);
    if (img) img.src = '';
  }
  for (let i = 0; i <= 4; i++) {
    const el = document.getElementById(`detail-ref-${i}`);
    if (el) el.value = '';
  }
  ['material', 'detail', 'color-text'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('custom-bg').value = '';
  document.getElementById('prompt-output').value = '';
  _activeMajor = '';
  _activeMinor = '';
  _activeGloss = '';
  document.querySelectorAll('#category-main-group .segment-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('category-sub-wrap').classList.remove('visible');
  document.querySelectorAll('.gloss-chip').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#cut-group .chip').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#bg-group .color-chip').forEach(b => b.classList.remove('active'));
  localStorage.removeItem('ppb_state');
  clearSavedImages();
  translationCache = null;
  updateCount();
  setCopyEnabled(false);
  setPromptStatus('소재, 디테일, 컬러를 입력한 뒤 프롬프트를 생성하세요.');
  hideBanner();
}
document.getElementById('reset-all-btn').addEventListener('click', resetAll);

/* ═══════════════════════════════════════════════
   14. 상태 저장 / 복원 (localStorage)
═══════════════════════════════════════════════ */
const LS_STATE = 'ppb_state';

/* ── IndexedDB for images (localStorage quota-safe) ── */
const IDB_NAME    = 'ppb_db';
const IDB_STORE   = 'images';
const IDB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      if (!e.target.result.objectStoreNames.contains(IDB_STORE))
        e.target.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

let _saveTimer = null;
function debouncedSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveState, 500);
}

function saveState() {
  try {
    const state = {
      material:   stripGlossTag(document.getElementById('material').value),
      detail:     document.getElementById('detail').value,
      color:      document.getElementById('color-text').value,
      mainRef:    document.getElementById('detail-ref-0')?.value || '',
      detailRefs: [1,2,3,4].map(i => document.getElementById(`detail-ref-${i}`)?.value || ''),
      prompt:     document.getElementById('prompt-output').value,
    };
    localStorage.setItem(LS_STATE, JSON.stringify(state));
  } catch (_) {}
}

async function saveImages() {
  try {
    const db = await openDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    for (let i = 0; i < MAX_IMAGES; i++) {
      if (images[i]?.file) store.put(images[i].file, i);
      else                  store.delete(i);
    }
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
  } catch (err) { console.warn('[saveImages]', err); }
}

async function clearSavedImages() {
  try {
    const db = await openDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).clear();
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
  } catch (_) {}
}

function _restoreChip(groupId, value) {
  if (!value) return;
  document.querySelectorAll(`#${groupId} .chip`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.value === value);
  });
}

function _restoreColorChip(value) {
  if (!value) return;
  document.querySelectorAll('#bg-group .color-chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.value === value);
  });
}

async function restoreImages() {
  try {
    const db    = await openDB();
    const tx    = db.transaction(IDB_STORE, 'readonly');
    const store = tx.objectStore(IDB_STORE);
    const keys  = await new Promise((res, rej) => {
      const r = store.getAllKeys();
      r.onsuccess = e => res(e.target.result);
      r.onerror   = e => rej(e.target.error);
    });
    for (const i of keys) {
      if (i < 0 || i >= MAX_IMAGES) continue;
      const file = await new Promise((res, rej) => {
        const r = store.get(i);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      });
      if (!file) continue;
      if (images[i]?.url) URL.revokeObjectURL(images[i].url);
      const url = URL.createObjectURL(file);
      images[i] = { file, url };
      document.getElementById(`thumb-img-${i}`).src = url;
      document.getElementById(`thumb-${i}`).classList.add('has-image');
    }
  } catch (err) { console.warn('[restoreImages]', err); }
  updateCount();
}

async function restoreState() {
  try {
    const raw = localStorage.getItem(LS_STATE);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.material)  document.getElementById('material').value   = s.material;
      if (s.detail)    document.getElementById('detail').value     = s.detail;
      if (s.color)     document.getElementById('color-text').value = s.color;
      if (s.mainRef) { const el = document.getElementById('detail-ref-0'); if (el) el.value = s.mainRef; }
      (s.detailRefs || []).forEach((val, i) => {
        const el = document.getElementById(`detail-ref-${i + 1}`);
        if (el && val) el.value = val;
      });
      if (s.prompt) {
        document.getElementById('prompt-output').value = s.prompt;
        setCopyEnabled(true);
      }
    }
  } catch (_) {}

  await restoreImages();
  localStorage.removeItem('ppb_images'); // 구 localStorage 이미지 데이터 정리
}

/* 텍스트 필드 자동 저장 */
['material', 'detail', 'color-text', 'detail-ref-0', 'detail-ref-1', 'detail-ref-2', 'detail-ref-3', 'detail-ref-4']
  .forEach(id => { document.getElementById(id)?.addEventListener('input', debouncedSave); });

document.getElementById('custom-bg').addEventListener('input', debouncedSave);
document.querySelectorAll('.extra-opt').forEach(cb => cb.addEventListener('change', saveState));

restoreState();
</script>
